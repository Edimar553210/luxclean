<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lux Clean</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background:
        linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.9)),
        url('https://images.unsplash.com/photo-1527515637462-cff94eecc1ac');
      background-size: cover;
      color: #fff;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 8%;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid rgba(212,175,55,0.2);
    }

    .logo img {
      height: 50px;
    }

    nav a {
      color: #fff;
      margin-left: 15px;
      text-decoration: none;
      font-weight: 600;
      padding: 6px 10px;
      border-radius: 8px;
    }

    nav a:hover {
      background: rgba(212,175,55,0.2);
      color: #d4af37;
    }

    .hero {
      text-align: center;
      padding: 120px 20px;
    }

    .hero h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
    }

    .hero span {
      color: #d4af37;
    }

    .hero p {
      max-width: 600px;
      margin: 0 auto 30px;
    }

    .btn {
      padding: 12px 25px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
      margin: 5px;
      display: inline-block;
    }

    .btn-primary {
      background: linear-gradient(135deg,#d4af37,#f1d77a);
      color: #111;
    }

    .btn-secondary {
      border: 2px solid #d4af37;
      color: #d4af37;
    }

    section {
      padding: 60px 8%;
      text-align: center;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: rgba(255,255,255,0.06);
      padding: 20px;
      border-radius: 20px;
      border: 1px solid rgba(212,175,55,0.2);
    }

    footer {
      text-align: center;
      padding: 20px;
      background: rgba(0,0,0,0.7);
      margin-top: 40px;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png">
  </div>

  <nav>
    <a href="#inicio">Início</a>
    <a href="#servicos">Serviços</a>
    <a href="#contato">Contato</a>
  </nav>
</header>

<section class="hero" id="inicio">
  <h1>Limpeza com <span>excelência</span></h1>
  <p>Serviço profissional, confiança e qualidade para o seu espaço.</p>

  <a class="btn btn-primary" href="https://wa.me/351924133226" target="_blank">
    Fazer orçamento
  </a>

  <a class="btn btn-secondary" href="#servicos">
    Ver serviços
  </a>
</section>

<section id="servicos">
  <h2>Nossos Serviços</h2>

  <div class="cards">
    <div class="card">Limpeza residencial</div>
    <div class="card">Limpeza pós obra</div>
    <div class="card">Limpeza de escritório</div>
    <div class="card">Limpeza profunda</div>
  </div>
</section>

<section id="contato">
  <h2>Contato</h2>
  <p>WhatsApp: +351 924 133 226</p>
</section>

<footer>
  © 2026 Lux Clean
</footer>

</body>
</html>
